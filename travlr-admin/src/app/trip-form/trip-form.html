<div class="container mt-4">
  <h2>{{ isEdit ? 'Edit Trip' : 'Add Trip' }}</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" [(ngModel)]="trip.name" name="name">
    </div>

    <div class="mb-3">
      <label class="form-label">Length</label>
      <input class="form-control" [(ngModel)]="trip.length" name="length">
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" [(ngModel)]="trip.price" name="price">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" [(ngModel)]="trip.description" name="description"></textarea>
    </div>

    <button class="btn btn-primary" type="submit">
      {{ isEdit ? 'Update Trip' : 'Add Trip' }}
    </button>
  </form>
</div>
